<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clicker Template</title>
    <style>
      :root {
        --frame-width: 320px;
        --frame-height: 240px;
      }

      body {
        margin: 0;
        font-family: sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .game-frame {
        width: var(--frame-width);
        height: var(--frame-height);
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 8px;
        background: #1e293b;
        padding: 12px;
        border-radius: 12px;
      }
      h1,
      p {
        margin: 0;
      }
      h1 {
        font-size: 24px;
        line-height: 1.1;
      }
      button {
        width: 100%;
        padding: 14px;
        font-size: 20px;
        border: 0;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <main class="game-frame">
      <h1>Tap Rush</h1>
      <p id="goal"></p>
      <button id="tap">Tap</button>
      <p id="status"></p>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/indiecake-engine@latest/dist/indiecake-engine.iife.min.js"></script>
    <script src="./game.js"></script>
  </body>
</html>
