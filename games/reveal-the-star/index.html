<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reveal the Star</title>
    <style>
      :root {
        --frame-width: 320px;
        --frame-height: 240px;
      }

      html {
        background: black;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .game-frame {
        width: var(--frame-width);
        height: var(--frame-height);
        display: grid;
        place-items: center;
        padding: 12px;
        background: radial-gradient(
          ellipse at center,
          #1a1a2e 0%,
          #0d0d0d 100%
        );
        border-radius: 4px;
      }
      .tile-row {
        display: flex;
        justify-content: center;
        gap: 14px;
        margin: 0;
      }
      .tile {
        width: 80px;
        height: 80px;
        background: linear-gradient(145deg, #3a3a4a, #252530);
        border: 2px solid #4a4a5a;
        box-shadow:
          0 4px 0 #111,
          0 6px 12px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.07);
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        font-size: 1.6rem;
        border-radius: 12px;
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease,
          border-color 0.15s ease;
        user-select: none;
      }

      .tile:hover {
        transform: translateY(-2px);
        border-color: #6a6a8a;
        box-shadow:
          0 6px 0 #111,
          0 10px 20px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }

      .tile:active {
        transform: translateY(2px);
        box-shadow:
          0 1px 0 #111,
          0 2px 6px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(0, 0, 0, 0.2);
      }

      @keyframes pulse {
        0% {
          transform: scale(1) translateY(0);
          border-color: #0096ff;
          box-shadow:
            0 4px 0 #003a70,
            0 6px 18px rgba(0, 150, 255, 0.4),
            inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }
        100% {
          transform: scale(1.06) translateY(-2px);
          border-color: #44b8ff;
          box-shadow:
            0 6px 0 #003a70,
            0 10px 28px rgba(0, 180, 255, 0.6),
            inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }
      }
    </style>
  </head>
  <body>
    <main class="game-frame">
      <div class="tile-row">
        <div class="tile" data-i="0">?</div>
        <div class="tile" data-i="1">?</div>
        <div class="tile" data-i="2">?</div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/indiecake-engine@0.1.0/dist/indiecake-engine.iife.min.js"></script>
    <script src="./game.js"></script>
  </body>
</html>
